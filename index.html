<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AttendFlow Preview</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:#f8fafc;color:#0f172a} .landing{min-height:100vh;display:flex;align-items:center;justify-content:center;background:white;padding:24px;text-align:center}.logo{width:64px;height:64px;border-radius:18px;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;margin:0 auto 22px;box-shadow:0 12px 30px #dbeafe}.landing h1{font-size:56px;margin:0 0 12px}.landing p{font-size:22px;color:#64748b;margin:0 0 28px}.btn{border:0;border-radius:14px;background:#2563eb;color:white;font-weight:700;padding:14px 22px;cursor:pointer}.app{display:none;min-height:100vh}.top{background:white;border-bottom:1px solid #e2e8f0;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px}.top h1{margin:0;font-size:26px}.top p{margin:4px 0 0;color:#64748b}.date{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:9px 14px;font-weight:700}.wrap{max-width:1180px;margin:0 auto;padding:24px;display:grid;gap:20px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.card,.panel{background:white;border:1px solid #e2e8f0;border-radius:18px;box-shadow:0 10px 28px rgba(15,23,42,.07)}.card{padding:22px}.card span{color:#64748b;font-size:14px}.card strong{display:block;margin-top:8px;font-size:34px}.panel{padding:22px}.panel h2{margin:0 0 6px;font-size:20px}.muted{color:#64748b;margin:0 0 18px;font-size:14px}.row{display:grid;grid-template-columns:1fr auto auto;gap:10px}.input{height:44px;border:1px solid #cbd5e1;border-radius:12px;padding:0 12px;background:white}.btn2{height:44px;border:1px solid #dbeafe;border-radius:12px;background:white;color:#1d4ed8;font-weight:700;padding:0 16px;cursor:pointer}.btn3{height:44px;border:1px solid #e2e8f0;border-radius:12px;background:white;color:#334155;font-weight:700;padding:0 16px;cursor:pointer}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}table{width:100%;border-collapse:separate;border-spacing:0;min-width:680px}th{background:#f8fafc;color:#475569;text-align:left;padding:13px;border-bottom:1px solid #e2e8f0}td{padding:13px;border-bottom:1px solid #f1f5f9;color:#475569}.scroll{overflow:auto}.badge{border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700}.work{background:#ecfdf5;color:#047857}.off{background:#f1f5f9;color:#475569}.form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:16px}@media(max-width:800px){.cards{grid-template-columns:1fr 1fr}.row,.form{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.landing h1{font-size:42px}}@media(max-width:520px){.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="landing" id="landing"><section aria-labelledby="landing-title"><div class="logo" aria-hidden="true">A</div><h1 id="landing-title">AttendFlow</h1><p>Simple Attendance Demo</p><button class="btn" type="button" onclick="startDemo()">데모 시작</button></section></main>
  <main class="app" id="app"><header class="top"><div><h1>AttendFlow</h1><p>Simple Attendance Demo</p></div><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><button class="btn3" type="button" onclick="resetDemo()">데모 데이터 초기화</button><div class="date" id="today"></div></div></header><div class="wrap"><section class="cards" aria-label="출석 요약"><div class="card"><span>오늘 출근</span><strong id="inCount">0</strong></div><div class="card"><span>오늘 퇴근</span><strong id="outCount">0</strong></div><div class="card"><span>현재 근무중</span><strong id="workingCount">0</strong></div><div class="card"><span>전체 직원</span><strong id="totalCount">5</strong></div></section><section class="panel" aria-labelledby="check-title"><h2 id="check-title">출퇴근</h2><p class="muted">직원을 선택하고 출근 또는 퇴근을 기록합니다.</p><div class="row"><label class="sr-only" for="employeeSelect">직원 선택</label><select class="input" id="employeeSelect"></select><button class="btn2" type="button" onclick="checkIn()">출근</button><button class="btn3" type="button" onclick="checkOut()">퇴근</button></div></section><section class="panel" aria-labelledby="employee-title"><h2 id="employee-title">직원 관리</h2><p class="muted">더미 직원 5명, 추가/삭제 가능</p><form class="form" onsubmit="event.preventDefault();addEmployee();"><label class="sr-only" for="name">이름</label><input class="input" id="name" placeholder="이름"><label class="sr-only" for="dept">부서</label><input class="input" id="dept" placeholder="부서"><button class="btn2" type="submit">직원 추가</button></form><div class="scroll"><table><caption class="sr-only">직원 목록</caption><thead><tr><th scope="col">이름</th><th scope="col">부서</th><th scope="col">상태</th><th scope="col">오늘 출근</th><th scope="col">오늘 퇴근</th><th scope="col">관리</th></tr></thead><tbody id="employees"></tbody></table></div></section><section class="panel" aria-labelledby="record-title"><h2 id="record-title">기록</h2><p class="muted">출퇴근 기록 테이블</p><button class="btn2" type="button" onclick="downloadExcel()">엑셀 다운로드</button><div class="scroll" style="margin-top:16px"><table><caption class="sr-only">출퇴근 기록</caption><thead><tr><th scope="col">날짜</th><th scope="col">이름</th><th scope="col">출근</th><th scope="col">퇴근</th><th scope="col">근무시간</th></tr></thead><tbody id="records"></tbody></table></div></section></div></main>
  <script>
    const today = new Date().toISOString().slice(0,10); document.getElementById('today').textContent='오늘 '+today;
    const defaultEmployees=[{id:1,name:'김민준',dept:'개발',status:'퇴근'},{id:2,name:'이서연',dept:'디자인',status:'퇴근'},{id:3,name:'박지훈',dept:'마케팅',status:'퇴근'},{id:4,name:'최유진',dept:'운영',status:'퇴근'},{id:5,name:'정도현',dept:'영업',status:'퇴근'}];
    let employees = JSON.parse(localStorage.getItem('af_employees')||'null') || defaultEmployees;
    if(!employees.length) employees = defaultEmployees;
    let records = JSON.parse(localStorage.getItem('af_records')||'[]');
    function save(){localStorage.setItem('af_employees',JSON.stringify(employees));localStorage.setItem('af_records',JSON.stringify(records));}
    function resetDemo(){employees=defaultEmployees.map(e=>({...e}));records=[];save();render();}
    function startDemo(){document.getElementById('landing').style.display='none';document.getElementById('app').style.display='block';render();}
    function time(){return new Date().toTimeString().slice(0,5)}
    function addEmployee(){const n=document.getElementById('name').value.trim();const d=document.getElementById('dept').value.trim();if(!n||!d)return;employees.push({id:Date.now(),name:n,dept:d,status:'퇴근'});document.getElementById('name').value='';document.getElementById('dept').value='';save();render();}
    function del(id){employees=employees.filter(e=>e.id!==id);save();render();}
    function checkIn(){const id=+document.getElementById('employeeSelect').value;const e=employees.find(x=>x.id===id);if(!e||e.status==='근무중')return;e.status='근무중';records.unshift({id:Date.now(),emp:id,date:today,name:e.name,in:time(),out:''});save();render();}
    function checkOut(){const id=+document.getElementById('employeeSelect').value;const e=employees.find(x=>x.id===id);if(!e||e.status==='퇴근')return;e.status='퇴근';const r=records.find(x=>x.emp===id&&!x.out);if(r)r.out=time();save();render();}
    function hours(r){if(!r.out)return '-';const a=new Date(r.date+'T'+r.in),b=new Date(r.date+'T'+r.out);const m=Math.max(0,Math.round((b-a)/60000));return Math.floor(m/60)+'시간 '+(m%60)+'분'}
    function todayRecord(empId){return records.find(r=>r.emp===empId&&r.date===today)||{};}
    function downloadExcel(){const rows=[['날짜','이름','출근','퇴근','근무시간'],...records.map(r=>[r.date,r.name,r.in,r.out||'',hours(r)])];const csv='﻿'+rows.map(row=>row.map(v=>'"'+String(v).replaceAll('\"','\"\"')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='attendflow-records.csv';a.click();URL.revokeObjectURL(a.href);}
    function render(){document.getElementById('employeeSelect').innerHTML=employees.map(e=>'<option value="'+e.id+'">'+e.name+' · '+e.dept+'</option>').join('');document.getElementById('employees').innerHTML=employees.map(e=>{const r=todayRecord(e.id);return '<tr><td><b>'+e.name+'</b></td><td>'+e.dept+'</td><td><span class="badge '+(e.status==='근무중'?'work':'off')+'">'+e.status+'</span></td><td>'+(r.in||'-')+'</td><td>'+(r.out||'-')+'</td><td><button class="btn3" onclick="del('+e.id+')">삭제</button></td></tr>'}).join('');document.getElementById('records').innerHTML=records.length?records.map(r=>'<tr><td>'+r.date+'</td><td><b>'+r.name+'</b></td><td>'+r.in+'</td><td>'+(r.out||'-')+'</td><td>'+hours(r)+'</td></tr>').join(''):'<tr><td colspan="5" style="text-align:center;color:#64748b;padding:28px">아직 기록이 없습니다.</td></tr>';document.getElementById('inCount').textContent=records.filter(r=>r.date===today).length;document.getElementById('outCount').textContent=records.filter(r=>r.date===today&&r.out).length;document.getElementById('workingCount').textContent=employees.filter(e=>e.status==='근무중').length;document.getElementById('totalCount').textContent=employees.length;}
  </script>
</body>
</html>
